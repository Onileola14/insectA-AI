<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insect AI — Treatment Calculator</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-pattern" aria-hidden="true"></div>
    <header class="header">
      <div class="logo">
        <span class="logo-icon" aria-hidden="true">🐞</span>
        <span class="logo-text">Insect<span class="logo-accent">AI</span></span>
      </div>
      <p class="tagline">Estimate spray volume and product quantity.</p>
      <div class="actions">
        <a class="btn btn-ghost" href="/">Scan</a>
        <a class="btn btn-ghost" href="/history.html">Scan History</a>
        <a class="btn btn-ghost" href="/treatment.html">Treatment Calculator</a>
      </div>
    </header>
    <main class="main">
      <section class="results">
        <h2 class="results-title">Treatment Calculator</h2>
        <div class="detail-card">
          <div class="actions">
            <input id="area-input" class="input" type="number" step="0.01" placeholder="Area" />
            <select id="unit-input" class="input">
              <option value="ha">Hectare (ha)</option>
              <option value="acre">Acre</option>
            </select>
            <button class="btn btn-primary" id="calc-btn" type="button">Calculate</button>
          </div>
          <p id="calc-result" class="dropzone-hint"></p>
        </div>
      </section>
    </main>
    <script src="/treatment.js"></script>
  </body>
</html>
